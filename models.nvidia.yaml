# ── models.nvidia.yaml ──────────────────────────────────────────────────────
# LiteLLM config for NVIDIA GPU backend (vLLM).
# Mounted as /app/config.yaml when BACKEND=nvidia.
#
# The active model is driven entirely by VLLM_MODEL in .env.
# docker-compose.nvidia.yml injects LITELLM_MODEL=openai/<VLLM_MODEL>
# into the LiteLLM container, so this config reads it via os.environ/.
#
# To switch models:  just change VLLM_MODEL in .env → make restart
# ─────────────────────────────────────────────────────────────────────────────

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY

litellm_settings:
  drop_params: true
  set_verbose: false
  request_timeout: 600
  stream_timeout: 300
  num_retries: 2
  cache: true
  cache_params:
    type: local
    ttl: 600
  success_callback: ["prometheus"]
  failure_callback: ["prometheus"]

model_list:

  - model_name: default
    litellm_params:
      model: os.environ/LITELLM_MODEL
      api_key: none
      api_base: http://vllm:8000/v1
    model_info:
      id: default
      description: "GPU-accelerated model served by vLLM. See VLLM_MODEL in .env."
