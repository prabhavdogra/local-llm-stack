# ── Local LLM Stack ──────────────────────────────────────────────────────────
# Shared services for every backend.  Backend-specific additions live in
# docker-compose.nvidia.yml (merged automatically when BACKEND=nvidia).
#
# Usage:
#   make up                   Start stack (reads BACKEND from .env)
#   make up BACKEND=nvidia    Override backend for this invocation
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Inference Gateway ────────────────────────────────────────────────────
  # Single OpenAI-compatible endpoint for all consumers.
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm
    ports:
      - "${LITELLM_PORT:-4000}:4000"
    volumes:
      - ./models.yaml:/app/config.yaml:ro
    command:
      - "--config"
      - "/app/config.yaml"
      - "--port"
      - "4000"
      - "--num_workers"
      - "${LITELLM_WORKERS:-4}"
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-sk-llmstack-local}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - llmstack
    restart: unless-stopped
    logging: &default-logging
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health/readiness"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Chat UI ──────────────────────────────────────────────────────────────
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    ports:
      - "${WEBUI_PORT:-3001}:8080"
    volumes:
      - openwebui_data:/app/backend/data
    environment:
      - ENABLE_OLLAMA_API=false
      - OPENAI_API_BASE_URLS=http://litellm:4000/v1
      - OPENAI_API_KEYS=${LITELLM_MASTER_KEY:-sk-llmstack-local}
      - WEBUI_AUTH=false
      - ENABLE_SIGNUP=false
    networks:
      - llmstack
    depends_on:
      litellm:
        condition: service_healthy
    restart: unless-stopped
    logging: *default-logging

  # ── Metrics ──────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    networks:
      - llmstack
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "2"

  # ── Dashboards ───────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    networks:
      - llmstack
    depends_on:
      - prometheus
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "2"

networks:
  llmstack:
    driver: bridge

volumes:
  openwebui_data:
  prometheus_data:
  grafana_data:
